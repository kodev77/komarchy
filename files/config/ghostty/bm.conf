# bm — dedicated Ghostty config for the bm TUI.
# Applied via `ghostty --config-file=...`, layered on top of the user's
# main ~/.config/ghostty/config. Only overrides the two settings we need.

# GTK app-id. Must be reverse-DNS. Hyprland windowrules match on this.
class = com.ko.bm

# Force a dedicated ghostty process so the launcher can track the window.
# Without this, GTK single-instance delegates to any running ghostty and
# the launched CLI exits immediately, breaking lifecycle.
gtk-single-instance = false

# Fully transparent — the desktop/wallpaper shows through. The TUI's CSS
# sets widget backgrounds to transparent, which renders as cells with the
# terminal's default background — those are the cells ghostty punches
# through. Blur is off so we see the desktop, not a frosted pane.
background-opacity = 0.75
background-blur = false

# Horizontal window padding in pixels — gives text breathing room so
# titles don't rub against the right edge. At opacity 0.75 the padding
# area blends with the cells (both at 75%), so it reads as margin, not
# an opaque frame. Vertical stays 0 since top/bottom already feel right.
window-padding-x = 10
window-padding-y = 0

# No GTK titlebar/CSD — the black "bm" title strip at the top breaks the
# edge-to-edge transparent look. Hyprland already manages the window, so
# server-side decoration adds nothing.
window-decoration = false

# Extra vertical breathing room on every row. 30% adds ~6px on a typical
# cell — airy but still keeps a reasonable number of visible rows.
adjust-cell-height = 30%
